[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "localization-json-runtime"
version = "0.1.0"
description = "Small explicit localization runtime for JSON locale files"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "localization maintainers"}]
keywords = ["i18n", "l10n", "localization", "json"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "License :: OSI Approved :: MIT License",
  "Intended Audience :: Developers",
]

[tool.setuptools]
packages = ["localization"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
